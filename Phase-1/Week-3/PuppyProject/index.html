<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puppy Page</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <div class="header content">
            <h1>Puppy lovers page</h1>
        </div>
    </header>
    <main>
        <!--banner puppies-->
        <section>
            <div class="banner">
                <img src="./images/banner-puppies.jpg" alt="Banner Puppies">
            </div>
        </section>

        <!--three puppies-->
        <section class="three-puppies container" >
            <!-- Puppy 1 -->
            <div class="puppy">
                <img src="./images/puppy-1.jpg" alt="Puppy 1">
            </div>
            <!-- Puppy missing -->
            <div class="puppy missing">
                <div class="puppy-missing-content">
                    <p>Puppy missing here!!</p>
                </div>
            </div>
            <!-- Puppy 3 -->
            <div class="puppy ">
                <img src="./images/puppy-2.jpg" alt="Puppy 3">
            </div>
        </section>

        <!--more puppies-->
        <section>
            <div class="more-puppies">
                <h2>More Puppies</h2>
            </div>
        </section>
        
        
        <!--two puppies-->
        <section class="two-puppies container">
            <div>
                <!-- Puppy 3 -->
                <img class="puppy-3" src="./images/puppy-3.jpg" alt="Puppy 3">
                <!-- Puppy 4 -->
                <img class="puppy-3"  src="./images/puppy-4.jpg" alt="Puppy 4">
            </div>
        </section>
    </main>
    <footer>
        <div class="footer content">
            <h2>Developed by: Zelalem Belay</h2>
        </div>
    </footer>
</body>
</html>
