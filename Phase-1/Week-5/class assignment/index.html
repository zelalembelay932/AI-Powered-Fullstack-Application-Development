<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Wireframe Layout</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <header class="header">
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact Us</a>
            <a href="how-it-works.html" class="desktop-only">How It Works</a>
        </nav>
    </header>

    <div class="sub-header">
        <span>This is cool design</span>
    </div>

    <main class="main-container">
        <div class="column left-column">
            <div class="large-green">
                <div class="box green-box"></div>
                <div class="box green-box"></div>
            </div>
        </div>

        <div class="column right-column">
            <div class="box grey-box large-grey">
                <!-- new -->
                <div class="large-grey-internal"></div>
            </div>

            <div class="sub-row">
                <div class="box grey-box small-grey"></div>
                <div class="box grey-box small-grey"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-item contact-info">
            <strong>contact No:</strong>
            <p>+251-456-89976-45</p>
            <p>+567-567-345666-3</p>
        </div>
        
        <div class="footer-item address-info desktop-only">
            <strong>address:</strong>
            <p>A.A, USA</p>
            <p>UE, UAE</p>
        </div>
    </footer>

</body>
</html>
